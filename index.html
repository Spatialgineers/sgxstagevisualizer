        body { margin: 0; overflow: hidden; background-color: #010101; font-family: 'Rajdhani', sans-serif; color: #ffffff; user-select: none; }

        .ui-layer { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; }
        .interactive-element { pointer-events: auto; }
        .font-tech { font-family: 'Share Tech Mono', monospace; }

        /* Modificado para que soporte display block perfectamente y evite el desface de wrap */
        .glitch-text { position: relative; }
        .glitch-text::before, .glitch-text::after { content: attr(data-text); position: absolute; top: 0; left: 0; opacity: 0.8; width: 100%; }
        .glitch-text::before { left: 2px; text-shadow: -1px 0 #ff00c1; animation: glitch-anim-1 2s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -1px 0 #00fff9; animation: glitch-anim-2 3s infinite linear alternate-reverse; }
        @keyframes glitch-anim-1 { 0% { clip: rect(20px, 9999px, 85px, 0); } 100% { clip: rect(10px, 9999px, 90px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(12px, 9999px, 59px, 0); } 100% { clip: rect(30px, 9999px, 70px, 0); } }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #FDCC0D; cursor: pointer; margin-top: -7px; box-shadow: 0 0 10px #FDCC0D; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(50, 82, 123, 0.5); border-radius: 2px; }
        
        .ui-transition { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; }
        .is-hidden { opacity: 0 !important; transform: scale(0.95) translateY(15px) !important; pointer-events: none !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FDCC0D; border-radius: 10px; }
        
        .color-input { -webkit-appearance: none; border: none; width: 100%; height: 24px; border-radius: 6px; cursor: pointer; background: transparent; }
        .color-input::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; }

        .toggle-btn { background: rgba(255,255,255,0.05); color: #777; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; cursor: pointer; text-align: center; }
        .toggle-btn.active { background: #FDCC0D !important; color: #000 !important; border-color: #FDCC0D !important; box-shadow: 0 0 15px rgba(253, 204, 13, 0.4); }

    <script>
        // Los Shaders GLSL ahora están inyectados directamente como variables
        // Esto elimina cualquier error de 'textContent' nulo por falta de sincronización del DOM
        const vertexShaderGLSL = `
            uniform float uTime;
            uniform float uAudioData;
            uniform float uNoiseAmpBase;
            uniform float uAudioSens;
            uniform vec2 uMouse;
            uniform float uClickExplode;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;

            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0); const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g; vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857; vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ * ns.x + ns.yyyy; vec4 y = y_ * ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x); vec3 p1 = vec3(a0.zw, h.y); vec3 p2 = vec3(a1.xy, h.z); vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0); m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                float noiseFreq = 0.6 + (uMouse.x * 0.2);
                float noiseAmp = uNoiseAmpBase + (uAudioData * uAudioSens);
                vec3 noisePos = vec3(position.x * noiseFreq + uTime * 0.2, position.y * noiseFreq + uTime * 0.2, position.z * noiseFreq);
                float noiseVal = snoise(noisePos) * noiseAmp;
                
                float explodeEffect = snoise(position * 2.5 + uTime) * uClickExplode;
                
                vec3 newPosition = position + normal * (noiseVal + explodeEffect);
                vPosition = newPosition;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;

        const fragmentShaderGLSL = `
            uniform float uTime;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            uniform float uAudioData;
            uniform float uDensity;
            uniform sampler2D uTexMask;
            uniform bool uHasTex;
            uniform float uTexScale;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;

            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0); const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g; vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857; vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ * ns.x + ns.yyyy; vec4 y = y_ * ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x); vec3 p1 = vec3(a0.zw, h.y); vec3 p2 = vec3(a1.xy, h.z); vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0); m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            void main() {
                // MEZCLA DE COLOR GLOBAL basada en posición espacial
                float noiseVal = snoise(vPosition * 0.12 + uTime * 0.2) * 0.5 + 0.5;
                vec3 color = mix(uColor1, uColor2, smoothstep(0.1, 0.9, noiseVal));
                color = mix(color, uColor3, cos(vPosition.y * 0.5 - uTime * 0.4) * uAudioData);
                
                if(uHasTex) {
                    // TRIPLANAR MAPPING PRO: Cobertura total 360 grados
                    vec3 blending = abs(vNormal);
                    blending /= (blending.x + blending.y + blending.z);
                    
                    vec2 xUV = vPosition.yz * uTexScale;
                    vec2 yUV = vPosition.xz * uTexScale;
                    vec2 zUV = vPosition.xy * uTexScale;
                    
                    vec4 xTex = texture2D(uTexMask, xUV);
                    vec4 yTex = texture2D(uTexMask, yUV);
                    vec4 zTex = texture2D(uTexMask, zUV);
                    
                    vec4 triplanarTex = xTex * blending.x + yTex * blending.y + zTex * blending.z;
                    color = mix(color, triplanarTex.rgb, 0.7);
                }

                vec3 viewDir = normalize(cameraPosition - vPosition);
                float fresnel = pow(1.0 - clamp(dot(viewDir, vNormal), 0.0, 1.0), 3.0);
                vec3 finalColor = color + (fresnel * uColor1 * (1.5 + uAudioData * 4.0));
                float alpha = mix(0.4, 1.0, uDensity);
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        let scene, camera, renderer, tiltGroup, activeGroup, coreWireframe, particlesMesh, gridHelper, uniforms, reactiveMaterial;
        let audioContext, analyser, dataArray, isAudioInitialized = false;
        let mouse = new THREE.Vector2(), targetMouse = new THREE.Vector2();
        let windowHalfX = window.innerWidth / 2, windowHalfY = window.innerHeight / 2;
        let clickExplodeTarget = 0.0;
        
        let globalGLTFLoader;
        
        let isRotating = true;
        let rotationAxis = { x: false, y: true, z: false };
        let rotationSpeed = 0.01;
        let assetScale = 1.0;
        let currentMorphology = 'reactor';
        let lemniscataAnimParam = 0;

        const clock = new THREE.Clock();
        const el = (id) => document.getElementById(id);
        const safeSetText = (id, text) => { const item = el(id); if(item) item.innerText = text; };

        // Función robusta para generar geometría paramétrica nativamente, eliminando la dependencia de clases removidas en ThreeJS
        function createParametricGeometry(func, slices, stacks) {
            const vertices = [];
            const uvs = [];
            const indices = [];
            const p0 = new THREE.Vector3();
            for (let i = 0; i <= stacks; i++) {
                const v = i / stacks;
                for (let j = 0; j <= slices; j++) {
                    const u = j / slices;
                    func(u, v, p0);
                    vertices.push(p0.x, p0.y, p0.z);
                    uvs.push(u, v);
                }
            }
            for (let i = 0; i < stacks; i++) {
                for (let j = 0; j < slices; j++) {
                    const a = i * (slices + 1) + (j + 1);
                    const b = i * (slices + 1) + j;
                    const c = (i + 1) * (slices + 1) + j;
                    const d = (i + 1) * (slices + 1) + (j + 1);
                    indices.push(a, b, d);
                    indices.push(b, c, d);
                }
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        window.onload = () => { init(); animate(); setupEventListeners(); };

        function init() {
            const container = el('canvas-container');
            if(!container) return;

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010101, 0.005);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
            camera.position.set(0, 5, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // INSTANCIACIÓN ROBUSTA DE CARGADORES PRO
            globalGLTFLoader = new THREE.GLTFLoader();
            
            try {
                if (typeof THREE.DRACOLoader !== 'undefined') {
                    const dracoLoader = new THREE.DRACOLoader();
                    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.136.0/examples/js/libs/draco/');
                    globalGLTFLoader.setDRACOLoader(dracoLoader);
                }
            } catch(e) { console.warn("DRACO init failed:", e); }
            
            try {
                if (typeof THREE.KTX2Loader !== 'undefined') {
                    const ktx2Loader = new THREE.KTX2Loader();
                    ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.136.0/examples/js/libs/basis/');
                    ktx2Loader.detectSupport(renderer);
                    globalGLTFLoader.setKTX2Loader(ktx2Loader);
                }
            } catch(e) { console.warn("KTX2 init failed:", e); }

            uniforms = {
                uTime: { value: 0.0 }, uAudioData: { value: 0.0 }, 
                uColor1: { value: new THREE.Color(0xFDCC0D) },
                uColor2: { value: new THREE.Color(0x32527B) }, 
                uColor3: { value: new THREE.Color(0xB87333) }, 
                uNoiseAmpBase: { value: 0.5 },
                uAudioSens: { value: 2.0 }, uMouse: { value: new THREE.Vector2(0, 0) },
                uDensity: { value: 1.0 },
                uTexMask: { value: null }, uHasTex: { value: false }, uTexScale: { value: 0.1 },
                uClickExplode: { value: 0.0 }
            };

            // Material utilizando los strings directos en JS
            reactiveMaterial = new THREE.ShaderMaterial({
                vertexShader: vertexShaderGLSL,
                fragmentShader: fragmentShaderGLSL,
                uniforms: uniforms, transparent: true, side: THREE.DoubleSide
            });

            tiltGroup = new THREE.Group();
            scene.add(tiltGroup);

            activeGroup = new THREE.Group();
            tiltGroup.add(activeGroup);

            changeMorphology('reactor');
            createParticles(5000, 0.05);

            gridHelper = new THREE.GridHelper(1000, 100, 0x32527B, 0x050505);
            gridHelper.position.y = -50;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.2;
            scene.add(gridHelper);
        }

        function createParticles(count, size) {
            if(particlesMesh) { scene.remove(particlesMesh); particlesMesh.geometry.dispose(); particlesMesh.material.dispose(); }
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) { pos[i] = (Math.random() - 0.5) * 1000; }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particlesMesh = new THREE.Points(geo, new THREE.PointsMaterial({ 
                size: size, color: uniforms.uColor1.value, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
            }));
            scene.add(particlesMesh);
        }

        async function initAudio() {
            try {
                if (audioContext && audioContext.state === 'suspended') await audioContext.resume();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioInitialized = true;
                const btn = el('audio-btn');
                if(btn) { btn.innerText = "REACTOR: ONLINE"; btn.classList.add('bg-sgx-yellow', 'text-black'); }
                safeSetText('status-text', 'Live Synchronized');
            } catch (err) { safeSetText('status-text', 'Access Denied'); }
        }

        function updateLemniscataGeometry(timeParam) {
            const lemniscateFunc = (u, v, target) => {
                u *= Math.PI * 2;
                const scale = 20.0;
                const x = (scale * Math.cos(u)) / (1.0 + Math.pow(Math.sin(u), 2.0));
                const y = (scale * Math.sin(u) * Math.cos(u)) / (1.0 + Math.pow(Math.sin(u), 2.0));
                const phi = v * Math.PI * 2;
                const r = 3.0 + Math.sin(u * 2.0 + timeParam) * 1.0;
                target.set(x + r * Math.cos(phi), y + r * Math.sin(phi), r * Math.sin(phi + u) + Math.sin(u + timeParam)*5.0);
            };
            const newGeo = createParametricGeometry(lemniscateFunc, 128, 32);
            if (activeGroup.children.length > 0) {
                activeGroup.children[0].geometry.dispose();
                activeGroup.children[0].geometry = newGeo;
            }
        }

        function changeMorphology(type) {
            currentMorphology = type;
            while(activeGroup.children.length > 0) activeGroup.remove(activeGroup.children[0]);
            let newGeo, newWireGeo;
            switch(type) {
                case 'reactor': newGeo = new THREE.IcosahedronGeometry(12, 128); newWireGeo = new THREE.IcosahedronGeometry(12.2, 16); break;
                case 'gear':
                    const gearShape = new THREE.Shape();
                    const teeth = 12, inner = 9, outer = 13;
                    const step = Math.PI * 2 / teeth;
                    for (let i = 0; i < teeth; i++) {
                        const a = i * step;
                        if (i === 0) gearShape.moveTo(Math.cos(a - 0.1)*inner, Math.sin(a - 0.1)*inner);
                        gearShape.lineTo(Math.cos(a + 0.1)*inner, Math.sin(a + 0.1)*inner);
                        gearShape.lineTo(Math.cos(a + 0.2)*outer, Math.sin(a + 0.2)*outer);
                        gearShape.lineTo(Math.cos(a + step - 0.2)*outer, Math.sin(a + step - 0.2)*outer);
                        gearShape.lineTo(Math.cos(a + step - 0.1)*inner, Math.sin(a + step - 0.1)*inner);
                    }
                    gearShape.closePath();
                    const hole = new THREE.Path(); hole.absarc(0, 0, 5, 0, Math.PI * 2, true); gearShape.holes.push(hole);
                    newGeo = new THREE.ExtrudeGeometry(gearShape, { depth: 6, bevelEnabled: true, bevelThickness: 0.8, bevelSize: 0.8, bevelSegments: 5, curveSegments: 64 });
                    newWireGeo = newGeo.clone(); break;
                case 'triangle': newGeo = new THREE.TorusGeometry(15, 7, 6, 128); newWireGeo = new THREE.TorusGeometry(15.3, 7.1, 6, 64); break;
                case 'mobius':
                    const dummyGeo = new THREE.BufferGeometry(); newGeo = dummyGeo; newWireGeo = dummyGeo.clone(); break;
                case 'knot': newGeo = new THREE.TorusKnotGeometry(10, 4, 300, 64); newWireGeo = new THREE.TorusKnotGeometry(10.3, 4.1, 150, 32); break;
                case 'pillar': newGeo = new THREE.CylinderGeometry(10, 10, 80, 128, 64); newWireGeo = new THREE.CylinderGeometry(10.2, 10.2, 80.2, 32, 16); break;
            }
            const mesh = new THREE.Mesh(newGeo, reactiveMaterial);
            activeGroup.add(mesh);
            coreWireframe = new THREE.Mesh(newWireGeo, new THREE.MeshBasicMaterial({ color: 0xFFFFFF, wireframe: true, transparent: true, opacity: 0.05 }));
            activeGroup.add(coreWireframe);
            if (type === 'mobius') updateLemniscataGeometry(0);
            updateGroupScale();
        }

        function updateGroupScale() { activeGroup.scale.set(assetScale, assetScale, assetScale); }

        function setupEventListeners() {
            window.addEventListener('resize', () => { windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2; camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            document.addEventListener('mousemove', (e) => { targetMouse.set((e.clientX - windowHalfX) / windowHalfX, (e.clientY - windowHalfY) / windowHalfY); });
            document.addEventListener('touchmove', (e) => { if(e.touches.length > 0) targetMouse.set((e.touches[0].clientX - windowHalfX) / windowHalfX, (e.touches[0].clientY - windowHalfY) / windowHalfY); });

            const ui = el('ui-container'), btn = el('toggle-ui-btn');
            if(btn && ui) btn.onclick = () => { ui.classList.toggle('ui-hidden'); btn.innerText = ui.classList.contains('ui-hidden') ? "HUD: SHOW [H]" : "HUD: HIDE [H]"; };
            document.addEventListener('keydown', (e) => { if((e.key.toLowerCase() === 'h' || e.key === 'Escape') && ui && btn) { ui.classList.toggle('ui-hidden'); btn.innerText = ui.classList.contains('ui-hidden') ? "HUD: SHOW [H]" : "HUD: HIDE [H]"; } });
            
            document.addEventListener('click', (e) => { 
                if (audioContext && audioContext.state === 'suspended') audioContext.resume(); 
                if(!e.target.closest('.interactive-element')) clickExplodeTarget = 8.0;
            });

            if(el('audio-btn')) el('audio-btn').onclick = (e) => { e.stopPropagation(); if(!isAudioInitialized) initAudio(); };
            if(el('ctrl-distortion')) el('ctrl-distortion').oninput = (e) => { uniforms.uNoiseAmpBase.value = parseFloat(e.target.value); safeSetText('val-distortion', e.target.value); };
            if(el('ctrl-sens')) el('ctrl-sens').oninput = (e) => { uniforms.uAudioSens.value = parseFloat(e.target.value); safeSetText('val-sens', e.target.value); };
            if(el('ctrl-density')) el('ctrl-density').oninput = (e) => { uniforms.uDensity.value = parseFloat(e.target.value); safeSetText('val-density', e.target.value); if(coreWireframe) coreWireframe.material.opacity = (1 - parseFloat(e.target.value)) * 0.4 + 0.05; };
            if(el('ctrl-part-count')) el('ctrl-part-count').onchange = (e) => { createParticles(parseInt(e.target.value), parseFloat(el('ctrl-part-size').value)); safeSetText('val-part-count', e.target.value); };
            if(el('ctrl-part-size')) el('ctrl-part-size').oninput = (e) => { if(particlesMesh) particlesMesh.material.size = parseFloat(e.target.value); safeSetText('val-part-size', e.target.value); };
            if(el('ctrl-tex-scale')) el('ctrl-tex-scale').oninput = (e) => { uniforms.uTexScale.value = parseFloat(e.target.value); safeSetText('val-tex-scale', e.target.value); };
            if(el('ctrl-asset-scale')) el('ctrl-asset-scale').oninput = (e) => { assetScale = parseFloat(e.target.value); updateGroupScale(); safeSetText('val-asset-scale', e.target.value); };

            if(el('rotate-toggle')) el('rotate-toggle').onclick = (e) => { isRotating = !isRotating; e.target.classList.toggle('active', isRotating); };
            if(el('ctrl-speed')) el('ctrl-speed').oninput = (e) => { rotationSpeed = parseFloat(e.target.value); safeSetText('val-speed', e.target.value); };
            document.querySelectorAll('.axis-btn').forEach(b => b.onclick = (e) => { const axis = e.target.dataset.axis; rotationAxis[axis] = !rotationAxis[axis]; e.target.classList.toggle('active', rotationAxis[axis]); });
            if(el('erratic-btn')) el('erratic-btn').onclick = () => { isRotating = true; el('rotate-toggle').classList.add('active'); rotationAxis = {x: true, y: true, z: true}; document.querySelectorAll('.axis-btn').forEach(b => b.classList.add('active')); rotationSpeed = 0.2; el('ctrl-speed').value = 0.2; safeSetText('val-speed', "0.20"); };

            if(el('color-1')) el('color-1').oninput = (e) => { uniforms.uColor1.value.set(e.target.value); if(particlesMesh) particlesMesh.material.color.set(e.target.value); };
            if(el('color-2')) el('color-2').oninput = (e) => uniforms.uColor2.value.set(e.target.value);
            if(el('color-3')) el('color-3').oninput = (e) => uniforms.uColor3.set(e.target.value);

            document.querySelectorAll('.geo-btn').forEach(b => b.onclick = (e) => changeMorphology(e.target.dataset.geo));

            const glbIn = el('glb-upload'), bgIn = el('bg-upload'), texIn = el('tex-upload');
            if(el('upload-trigger')) el('upload-trigger').onclick = () => glbIn.click();
            if(el('bg-upload-trigger')) el('bg-upload-trigger').onclick = () => bgIn.click();
            if(el('tex-upload-trigger')) el('tex-upload-trigger').onclick = () => texIn.click();

            glbIn.onchange = (ev) => {
                const file = ev.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    globalGLTFLoader.parse(e.target.result, '', (gltf) => {
                        currentMorphology = 'custom_glb';
                        while(activeGroup.children.length > 0) activeGroup.remove(activeGroup.children[0]);
                        const model = gltf.scene;
                        model.traverse((child) => { if (child.isMesh) { child.material = reactiveMaterial; child.geometry.computeVertexNormals(); } });
                        const box = new THREE.Box3().setFromObject(model);
                        model.position.sub(box.getCenter(new THREE.Vector3()));
                        const s = 45 / Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y, box.getSize(new THREE.Vector3()).z);
                        model.scale.set(s, s, s);
                        activeGroup.add(model);
                        safeSetText('status-text', 'Asset_Injected');
                    }, (err) => { console.error("Parse Error:", err); });
                };
                reader.readAsArrayBuffer(file);
            };

            bgIn.onchange = (ev) => {
                const file = ev.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => { new THREE.TextureLoader().load(e.target.result, (tex) => { scene.background = tex; }); };
                reader.readAsDataURL(file);
            };

            texIn.onchange = (ev) => {
                const file = ev.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    new THREE.TextureLoader().load(e.target.result, (tex) => {
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        uniforms.uTexMask.value = tex;
                        uniforms.uHasTex.value = true;
                        safeSetText('status-text', 'TRIPLANAR_ENVELOPED');
                    });
                };
                reader.readAsDataURL(file);
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            safeSetText('clock-display', new Date().toTimeString().split(' ')[0]);
            
            if(clickExplodeTarget > 0) {
                clickExplodeTarget -= 0.15;
                if(clickExplodeTarget < 0) clickExplodeTarget = 0;
            }
            uniforms.uClickExplode.value = clickExplodeTarget;
            
            if (isAudioInitialized && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for(let i=0; i<15; i++) sum += dataArray[i];
                const audio = sum / 15 / 255.0;
                uniforms.uAudioData.value = audio;
                if(gridHelper) gridHelper.position.y = -50 + (audio * 25);
                if(particlesMesh) { particlesMesh.rotation.y += audio * 0.05; particlesMesh.position.z = Math.sin(time) * 30 * audio; }
            } else { uniforms.uAudioData.value = Math.sin(time * 1.5) * 0.12 + 0.1; }
            
            uniforms.uTime.value = time;
            uniforms.uMouse.value.lerp(targetMouse, 0.05);
            mouse.lerp(targetMouse, 0.05);
            
            // MAGNETIC TILT Premium
            tiltGroup.rotation.z = mouse.x * -0.4;
            tiltGroup.rotation.x = mouse.y * 0.4;

            camera.position.x += (mouse.x * 60 - camera.position.x) * 0.05;
            camera.position.y += (-mouse.y * 40 + 5 - camera.position.y) * 0.05;
            camera.lookAt(0,0,0);
            
            if(isRotating) {
                if(rotationAxis.x) activeGroup.rotation.x += rotationSpeed;
                if(rotationAxis.y) activeGroup.rotation.y += rotationSpeed;
                if(rotationAxis.z) activeGroup.rotation.z += rotationSpeed;
            }

            if (currentMorphology === 'mobius') {
                lemniscataAnimParam += 0.03 + (uniforms.uAudioData.value * 0.1);
                updateLemniscataGeometry(lemniscataAnimParam);
            }
            
            if(currentMorphology === 'knot') {
                activeGroup.children[0].rotation.x += 0.02;
                activeGroup.children[0].rotation.z += 0.01;
            }

            if(Math.round(time*10)%5===0) safeSetText('fps-counter', Math.round(1/clock.getDelta()));
            renderer.render(scene, camera);
        }
    </script>
